<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IE Fitzcarrald — Vista 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a2a1a; font-family:'Segoe UI',sans-serif; color:#fff; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
header {
  background:linear-gradient(135deg,#1a3a0a,#2a5a10);
  padding:8px 18px; display:flex; align-items:center; gap:12px;
  border-bottom:2px solid #f6ad55; flex-shrink:0; z-index:10;
}
header h1 { font-size:14px; font-weight:700; }
header span { font-size:9px; color:#b0cc90; }
.badge { background:#f6ad55; color:#1a1a00; font-size:9px; font-weight:700; padding:3px 10px; border-radius:12px; margin-left:auto; }
#canvas-wrap { flex:1; position:relative; }
canvas { display:block; width:100%; height:100%; }
#tooltip {
  position:absolute; pointer-events:none;
  background:rgba(10,30,10,0.96); border:1.5px solid #f6ad55;
  border-radius:9px; padding:9px 13px; min-width:200px;
  opacity:0; transition:opacity 0.15s; z-index:50;
}
#tooltip.show { opacity:1; }
#tooltip h3 { font-size:12px; font-weight:700; margin-bottom:3px; color:#ffe080; }
#tooltip p { color:#b0cc90; font-size:10px; line-height:1.5; }
#tooltip .activities { margin-top:5px; font-size:10px; color:#ffcc44; }
#controls {
  position:absolute; top:10px; right:10px;
  display:flex; flex-direction:column; gap:5px; z-index:20;
}
.ctrl-btn {
  background:rgba(20,50,10,0.92); border:1px solid #6aaa30;
  color:#c0ff80; font-size:16px; width:34px; height:34px;
  border-radius:7px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.ctrl-btn:hover { background:rgba(40,90,20,0.95); }
#legend {
  position:absolute; bottom:10px; right:10px;
  background:rgba(10,25,5,0.92); border:1px solid #4a7a20;
  border-radius:10px; padding:8px 12px; z-index:20; min-width:175px;
}
#legend h4 { font-size:8px; font-weight:700; color:#8aaa60; margin-bottom:6px; text-transform:uppercase; letter-spacing:.7px; }
.leg { display:flex; align-items:center; gap:7px; font-size:9px; color:#c0d8a0; margin-bottom:3px; }
.leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
#hint {
  position:absolute; bottom:10px; left:10px;
  background:rgba(10,25,5,0.82); border:1px solid #4a7a20;
  border-radius:7px; padding:5px 10px; font-size:8px; color:#7a9a60; z-index:20;
}
</style>
</head>
<body>
<header>
  <div>
    <h1>🏫 IE Fitzcarrald — Vista 3D del Campus</h1>
    <span>Jr. Jaime Troncoso · Puerto Maldonado, Madre de Dios</span>
  </div>
  <div class="badge">🗺️ 3D Interactivo</div>
</header>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="tooltip">

    <p id="tt-desc"></p>

  <div id="controls">

    <button class="ctrl-btn" id="btn-rot-r">▶</button>
    <button class="ctrl-btn" id="btn-up">▲</button>
    <button class="ctrl-btn" id="btn-dn">▼</button>
    <button class="ctrl-btn" id="btn-zi">+</button>
    <button class="ctrl-btn" id="btn-zo">−</button>

// ─── SETUP THREE.JS ───────────────────────────────────────────────────────
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x2a4a1a);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a3a0a, 0.005);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
let camTheta = Math.PI/4, camPhi = Math.PI/3.5, camDist = 165;
const camTarget = new THREE.Vector3(0, 0, 0);
function updateCamera() {
  camera.position.set(
    camTarget.x + camDist*Math.sin(camPhi)*Math.sin(camTheta),
    camTarget.y + camDist*Math.cos(camPhi),
    camTarget.z + camDist*Math.sin(camPhi)*Math.cos(camTheta)
  );
  camera.lookAt(camTarget);
}
updateCamera();

// ─── LUCES ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x88cc88, 1.1));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(80,120,60); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
['left','right','top','bottom'].forEach((s,i)=>{sun.shadow.camera[s]=[-120,120,120,-120][i];});
sun.shadow.camera.far=500;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x44aa44, 0.5);
fill.position.set(-60,40,-40); scene.add(fill);

rim.position.set(0,20,-100); scene.add(rim);

function plane(color,y,w,d,rx=0,rz=0) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d), new THREE.MeshLambertMaterial({color}));
  m.rotation.x=-Math.PI/2; m.position.y=y; m.receiveShadow=true; scene.add(m); return m;
}
plane(0x1a3a0a,-0.1,300,300); // exterior verde oscuro
// calles
[[0,0,-48,140,10],[0,0,48,140,10],[[-70,0,0,10,110],[70,0,0,10,110]]].flat();

// ─── SPRITE LABEL HELPER ──────────────────────────────────────────────────
function makeLabel(text, x, y, z, size=18, bgColor='rgba(0,0,0,0.72)', textColor='#ffffff', maxW=220) {
  const c2 = document.createElement('canvas');
  c2.width=maxW; c2.height=36;
  const ctx=c2.getContext('2d');
  ctx.font=`bold ${size}px Segoe UI`;
  const tw=ctx.measureText(text).width;
  const pad=10;
  c2.width=tw+pad*2; c2.height=size+12;
  ctx.font=`bold ${size}px Segoe UI`;
  ctx.fillStyle=bgColor;
  roundRect(ctx,0,0,c2.width,c2.height,6);
  ctx.fill();
  ctx.fillStyle=textColor;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,c2.width/2,c2.height/2);
  const tex=new THREE.CanvasTexture(c2);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false}));
  sp.scale.set(c2.width/7, c2.height/7, 1);
  sp.position.set(x,y,z);
  scene.add(sp); return sp;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ─── ETIQUETAS DE CALLES ──────────────────────────────────────────────────
makeLabel('Jr. Jaime Troncoso',  0, 3,-50, 16,'rgba(80,60,0,0.88)','#ffe060',270);

  const arrowMat = new THREE.MeshBasicMaterial({color:0xffcc00});

// ─── EDIFICIOS ────────────────────────────────────────────────────────────
const allGroups = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlighted = null;

buildings.forEach(b => {
  const g = new THREE.Group();
  g.userData = b;

  // Cuerpo
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(b.w,b.h,b.d),
    new THREE.MeshLambertMaterial({color:b.color})
  );
  body.position.y = b.h/2;
  body.castShadow=true; body.receiveShadow=true;
  body.userData = b;
  g.add(body);

  // Techo
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(b.w+0.2, 0.5, b.d+0.2),
    new THREE.MeshLambertMaterial({color:b.top})
  );
  roof.position.y = b.h+0.25;
  roof.castShadow=true;
  g.add(roof);

  // Polideportivo: techo arco integrado (mismo ancho que el cuerpo)
  if(b.type === 'polideportivo') {
    // Arco con mismo ancho exacto que el cuerpo
    const archR = b.w/2;
    const archGeo = new THREE.CylinderGeometry(archR, archR, b.d, 20, 1, false, 0, Math.PI);
    const archMat = new THREE.MeshLambertMaterial({color:0xdd8800, side:THREE.DoubleSide});
    const arch = new THREE.Mesh(archGeo, archMat);
    arch.rotation.z = Math.PI/2;
    arch.rotation.y = Math.PI/2;
    arch.scale.y = 0.35; // aplanado
    arch.position.y = b.h + archR*0.35 - 0.5;
    arch.castShadow=true;
    g.add(arch);
    // quitar el techo plano para que no se solape
    g.remove(roof);
  }

  // Auditorio: bordes brillantes
  if(b.accent) {
    const eg = new THREE.EdgesGeometry(new THREE.BoxGeometry(b.w,b.h,b.d));
    const el = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({color:0xff8899,linewidth:2}));
    el.position.y=b.h/2; g.add(el);
    // luz puntual roja encima
    const pl = new THREE.PointLight(0xff3344, 2, 30);
    pl.position.set(0, b.h+5, 0); g.add(pl);
  }

  // Ventanas para edificios con altura
  if(b.h >= 5 && b.type !== 'inactivo') {
    const winMat = new THREE.MeshBasicMaterial({color:0xaaddff, opacity:0.65, transparent:true});
    const rows = Math.min(2,Math.floor(b.h/3));
    const cols = Math.min(5,Math.floor(b.w/4));
    for(let r=0;r<rows;r++) for(let col=0;col<cols;col++) {
      const wm = new THREE.Mesh(new THREE.PlaneGeometry(Math.min(1.8,b.w/6),1.2), winMat);
      wm.position.set(-b.w/2+1.5+col*(b.w-2)/Math.max(1,cols-1), 1.8+r*2.8, b.d/2+0.02);
      g.add(wm);
    }
  }

  g.position.set(b.x+b.w/2, 0, b.z+b.d/2);
  scene.add(g);
  allGroups.push(g);

  // Label flotante sobre edificio
  const labelY = b.h + 3.5;
  const lc = b.labelColor || '#ffffff';
  const bg = b.type==='inactivo' ? 'rgba(40,40,40,0.80)' :
             b.type==='auditorio' ? 'rgba(120,0,20,0.88)' :
             b.type==='cancha_fut' ? 'rgba(0,60,10,0.82)' :
             b.type==='cancha_azul' ? 'rgba(0,20,80,0.82)' :
             b.type==='cancha_morada' ? 'rgba(30,0,80,0.82)' :
             'rgba(0,20,20,0.80)';
  const shortName = b.name.replace(' (Sin uso)','').replace('Principal ','');
  makeLabel(shortName, g.position.x, g.position.y+labelY, g.position.z, 13, bg, lc, 220);

  // Sub-etiqueta actividades para auditorio
  if(b.type==='auditorio') {
    makeLabel('♟️🏓🎲🐸 · 🍱 Almuerzo', g.position.x, g.position.y+labelY+3, g.position.z, 11, 'rgba(80,0,10,0.85)', '#ffdd88', 250);
  }
  // Sub-etiqueta actividades para polideportivo
  if(b.type==='polideportivo') {
    makeLabel('🎉 Apertura · 🏀 Final Balonc. · 🏐 Final Vóley', g.position.x, g.position.y+labelY+3, g.position.z, 11, 'rgba(60,30,0,0.88)', '#ffcc66', 330);
  }
});

// ─── MARCADORES DE CANCHAS (líneas en el suelo) ───────────────────────────
function addLine(pts, color=0xffffff, opacity=0.55) {
  const mat = new THREE.LineBasicMaterial({color, opacity, transparent:true});
  const geo = new THREE.BufferGeometry().setFromPoints(pts.map(([x,z])=>new THREE.Vector3(x,0.1,z)));
  scene.add(new THREE.Line(geo, mat));
}
// divisiones canchas fútbol
addLine([[-52,-19],[-22,-19]], 0xffffff);
addLine([[-52,-6], [-22,-6]],  0xffffff);
addLine([[-52,-32],[-22,-32],[-22,7],[-52,7],[-52,-32]], 0xffffff, 0.4);
// círculo central fútbol
const circPts=[]; for(let i=0;i<=64;i++){const a=i/64*Math.PI*2; circPts.push([-37+Math.cos(a)*5, -15.5+Math.sin(a)*5]);} addLine(circPts,0xffffff,0.4);
// líneas cancha secundaria
addLine([[2,-27],[41,-27],[41,-5],[2,-5],[2,-27]], 0xffffff, 0.5);
addLine([[15,-27],[15,-5]], 0xffffff, 0.5);
addLine([[28,-27],[28,-5]], 0xffffff, 0.5);
// semicírculos basketball SC
for(const [cx,cz] of [[8.5,-27],[8.5,-5],[21.5,-27],[21.5,-5]]) {
  const pts=[]; for(let i=0;i<=32;i++){const a=i/32*Math.PI; pts.push([cx+Math.cos(a)*3.5,cz+(i<16?1:-1)*Math.sin(a)*3.5]);} addLine(pts,0xffffff,0.4);
}
// red vóley SA
addLine([[34.5,-27],[34.5,-5]], 0xffff00, 0.7);

function tree(x,z) {
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.45,2.5,6), new THREE.MeshLambertMaterial({color:0x4a2e08}));
  trunk.position.set(x,1.25,z); trunk.castShadow=true; scene.add(trunk);
  const crown=new THREE.Mesh(new THREE.SphereGeometry(2.8,7,5), new THREE.MeshLambertMaterial({color:0x228822}));
  crown.position.set(x,5,z); crown.castShadow=true; scene.add(crown);
  const crown2=new THREE.Mesh(new THREE.SphereGeometry(1.8,6,4), new THREE.MeshLambertMaterial({color:0x33aa33}));
  crown2.position.set(x+0.5,6.5,z-0.5); scene.add(crown2);
}

// ─── RAYCASTING / HOVER ───────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttDesc  = document.getElementById('tt-desc');
const ttAct   = document.getElementById('tt-act');

const rayMeshes = [];
scene.traverse(obj=>{ if(obj.isMesh && obj.userData.id) rayMeshes.push(obj); });

function highlightGroup(g, on) {
  g.traverse(obj=>{
    if(obj.isMesh && obj.material && obj.material.color) {
      if(!obj.material._orig) { obj.material = obj.material.clone(); obj.material._orig=true; }
      obj.material.emissive = new THREE.Color(on ? 0x446644 : 0x000000);
      obj.material.emissiveIntensity = on ? 0.6 : 0;
    }
  });
}

wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  mouse.x = ((e.clientX-r.left)/r.width)*2-1;
  mouse.y = -((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(rayMeshes);
  if(hits.length && hits[0].object.userData.id) {
    const d = hits[0].object.userData;
    ttName.textContent = d.name;
    ttDesc.textContent = d.desc;
    ttAct.textContent  = d.activities || '';
    tooltip.classList.add('show');
    let tx=e.clientX-r.left+14, ty=e.clientY-r.top+14;
    if(tx+215>r.width)  tx-=225;
    if(ty+100>r.height) ty-=110;
    tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
    const pg = hits[0].object.parent;
    if(highlighted !== pg) { if(highlighted) highlightGroup(highlighted,false); highlighted=pg; highlightGroup(pg,true); }
  } else {
    tooltip.classList.remove('show');
    if(highlighted) { highlightGroup(highlighted,false); highlighted=null; }
  }
});

// ─── CONTROLES ────────────────────────────────────────────────────────────
let drag=false, px=0, py=0;
wrap.addEventListener('mousedown', e=>{ drag=true; px=e.clientX; py=e.clientY; });
window.addEventListener('mouseup',  ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  camTheta -= (e.clientX-px)*0.007; px=e.clientX;
  camPhi = Math.max(0.18,Math.min(1.45, camPhi+(e.clientY-py)*0.005)); py=e.clientY;
  updateCamera();
});
wrap.addEventListener('wheel', e=>{ camDist=Math.max(50,Math.min(400,camDist+e.deltaY*0.18)); updateCamera(); },{passive:true});
let tp=null;
wrap.addEventListener('touchstart',e=>tp=e.touches[0]);
wrap.addEventListener('touchmove', e=>{
  if(!tp) return; const t=e.touches[0];
  camTheta-=(t.clientX-tp.clientX)*0.009;
  camPhi=Math.max(0.18,Math.min(1.45,camPhi+(t.clientY-tp.clientY)*0.007));
  tp=t; updateCamera();
});
document.getElementById('btn-rot-l').onclick=()=>{ camTheta-=0.18; updateCamera(); };
document.getElementById('btn-rot-r').onclick=()=>{ camTheta+=0.18; updateCamera(); };
document.getElementById('btn-up').onclick=()=>{ camPhi=Math.max(0.18,camPhi-0.1); updateCamera(); };
document.getElementById('btn-dn').onclick=()=>{ camPhi=Math.min(1.45,camPhi+0.1); updateCamera(); };
document.getElementById('btn-zi').onclick=()=>{ camDist=Math.max(50,camDist-18); updateCamera(); };
document.getElementById('btn-zo').onclick=()=>{ camDist=Math.min(400,camDist+18); updateCamera(); };
document.getElementById('btn-rst').onclick=()=>{ camTheta=Math.PI/4; camPhi=Math.PI/3.5; camDist=165; camTarget.set(0,0,0); updateCamera(); };

// ─── RESIZE + RENDER ──────────────────────────────────────────────────────
function resize() {
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();
(function animate(){ requestAnimationFrame(animate); renderer.render(scene,camera); })();
</script>
