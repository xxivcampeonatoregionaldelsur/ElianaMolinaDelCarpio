<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IE Fitzcarrald — Mapa del Campus</title>
<style>
:root {
  --bg:        #0f1a0f;
  --surface:   #162116;
  --panel:     #1a2a1a;
  --border:    #2d442d;
  --gold:      #e8b84b;
  --gold-dim:  #a07828;
  --text:      #e8ede8;
  --text-2:    #94a894;
  --text-3:    #5a6e5a;
  --font:      system-ui, -apple-system, 'Segoe UI', sans-serif;
  --safe-b:    env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); font-family:var(--font); color:var(--text); touch-action:none; }

/* ── HEADER ── */
header {
  position: absolute; top:0; left:0; right:0; z-index:30;
  height: 48px;
  background: rgba(15,26,15,0.97);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
}
header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.h-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing:.01em; }
.h-sub   { font-size: 10px; color: var(--text-3); margin-top:1px; }
.h-badge {
  margin-left:auto; background:rgba(232,184,75,.1); border:1px solid rgba(232,184,75,.3);
  border-radius:4px; padding:3px 9px; font-size:10px; font-weight:700;
  color:var(--gold); letter-spacing:.06em; text-transform:uppercase;
}

/* ── MAP CANVAS ── */
#map-wrap {
  position: absolute; top:48px; left:0; right:0; bottom:0;
  overflow: hidden; cursor: grab;
}
#map-wrap.dragging { cursor: grabbing; }
#map-svg { display:block; user-select:none; }

/* ── ZONAS SVG — estilos base ── */
.zona {
  cursor: pointer;
  transition: filter .15s, opacity .15s;
}
.zona:hover rect, .zona:active rect { filter: brightness(1.25); }
.zona.active rect { outline: none; }
.zona-label {
  font-family: var(--font);
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
  letter-spacing: .01em;
}
.zona-sub {
  font-family: var(--font);
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
}

/* ── PULSE del tap ── */
@keyframes tapRing {
  0%   { r: 0;  opacity:.8; }
  100% { r: 22px; opacity:0; }
}
.tap-ring { animation: tapRing .5s ease-out forwards; }

/* ── PANEL DE INFO (bottom sheet) ── */
#info-panel {
  position: absolute; bottom:0; left:0; right:0; z-index:40;
  background: var(--panel);
  border-top: 2px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 0 0 calc(12px + var(--safe-b));
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.25,.8,.25,1);
  box-shadow: 0 -8px 32px rgba(0,0,0,.5);
  will-change: transform;
  max-height: 55vh;
  display: flex; flex-direction: column;
}
#info-panel.open { transform: translateY(0); }

.panel-handle {
  width:36px; height:4px; border-radius:2px; background:var(--border);
  margin:10px auto 0; flex-shrink:0;
}
.panel-head {
  padding: 10px 16px 8px; flex-shrink:0;
  border-bottom: 1px solid var(--border);
  display:flex; align-items:flex-start; gap:12px;
}
.panel-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
.panel-head-text { flex:1; min-width:0; }
#panel-name {
  font-size: 15px; font-weight:700; color:var(--text);
  line-height:1.2; letter-spacing:.01em;
}
#panel-type {
  font-size: 10px; font-weight:700; color:var(--gold);
  text-transform:uppercase; letter-spacing:.08em; margin-top:3px;
}
.panel-close {
  width:28px; height:28px; border-radius:50%; border:1px solid var(--border);
  background:transparent; color:var(--text-2); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

.panel-body { padding:12px 16px; overflow-y:auto; }
#panel-desc { font-size:12.5px; color:var(--text-2); line-height:1.6; }
#panel-acts {
  margin-top:10px; padding:10px 12px;
  background:rgba(232,184,75,.07); border:1px solid rgba(232,184,75,.2);
  border-radius:8px; font-size:12px; color:var(--gold); line-height:1.7;
  white-space:pre-line;
}
#panel-acts:empty { display:none; }

/* ── LEYENDA ── */
#legend {
  position:absolute; top:58px; right:10px; z-index:20;
  background:rgba(15,26,15,.92); border:1px solid var(--border);
  border-radius:10px; padding:8px 10px;
  backdrop-filter:blur(6px);
}
#legend-toggle {
  background:none; border:none; color:var(--gold); font-size:16px;
  cursor:pointer; display:flex; align-items:center; gap:4px;
  font-size:11px; font-weight:700; color:var(--text-2);
  text-transform:uppercase; letter-spacing:.05em;
}
#legend-body { display:none; margin-top:6px; }
#legend-body.open { display:block; }
.leg { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text-2); margin-bottom:4px; }
.leg:last-child { margin-bottom:0; }
.leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

/* ── CONTROLES ZOOM ── */
#zoom-ctrl {
  position:absolute; bottom:calc(18px + var(--safe-b)); right:14px; z-index:20;
  display:flex; flex-direction:column; gap:3px;
}
.zb {
  width:34px; height:34px; border-radius:8px;
  background:rgba(15,26,15,.92); border:1px solid var(--border);
  color:var(--text-2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ── HINT ── */
#hint {
  position:absolute; bottom:calc(18px + var(--safe-b)); left:14px; z-index:20;
  background:rgba(15,26,15,.85); border:1px solid var(--border);
  border-radius:8px; padding:6px 10px; font-size:9px; color:var(--text-3);
  line-height:1.8; pointer-events:none;
}

/* ── NORTH ── */
#north {
  position:absolute; top:58px; left:10px; z-index:20;
  background:rgba(15,26,15,.88); border:1px solid var(--border);
  border-radius:8px; width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:var(--text-2); letter-spacing:.02em;
}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">🏫 IE Fitzcarrald — Campus</div>
    <div class="h-sub">Toca una zona para ver información</div>
  </div>
  <div class="h-badge">2D · Interactivo</div>
</header>

<!-- Indicador norte -->
<div id="north">N↑</div>

<!-- Leyenda colapsable -->
<div id="legend">
  <button id="legend-toggle" onclick="toggleLegend()">☰ Leyenda</button>
  <div id="legend-body">
    <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>Cancha de Fútbol</div>
    <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>Baloncesto</div>
    <div class="leg"><div class="leg-dot" style="background:#8b5cf6"></div>Vóley</div>
    <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Polideportivo</div>
    <div class="leg"><div class="leg-dot" style="background:#dc2626"></div>Auditorio</div>
    <div class="leg"><div class="leg-dot" style="background:#db2777"></div>Stand</div>
    <div class="leg"><div class="leg-dot" style="background:#0891b2"></div>SSHH</div>
    <div class="leg"><div class="leg-dot" style="background:#78716c"></div>Sin uso</div>
  </div>
</div>

<!-- Canvas del mapa -->
<div id="map-wrap">
  <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<!-- Panel de info -->
<div id="info-panel">
  <div class="panel-handle"></div>
  <div class="panel-head">
    <div class="panel-icon" id="panel-icon">📍</div>
    <div class="panel-head-text">
      <div id="panel-name">—</div>
      <div id="panel-type">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <p id="panel-desc"></p>
    <div id="panel-acts"></div>
  </div>
</div>

<!-- Zoom -->
<div id="zoom-ctrl">
  <button class="zb" onclick="zoomBy(1.25)">+</button>
  <button class="zb" onclick="zoomBy(0.8)">−</button>
  <button class="zb" title="Centrar" onclick="resetView()" style="font-size:13px;">⌖</button>
</div>

<!-- Hint -->
<div id="hint">
  👆 Toca una zona<br>
  ✌️ Pellizca para zoom<br>
  👋 Arrastra para mover
</div>

<script>

// Labels de calle (no interactivos, solo texto)
const STREET_LABELS = [
  { text:'Jr. Jaime Troncoso',    x:150,  y: 14, size:9  },
  { text:'Calle Ica — Ingreso',   x:210,  y:286, size:9  },
  { text:'Av. 15 de Agosto',          x: 14,  y:150, size:8, rotate:-90 },
  { text:'Av. Madre de Dios',         x:286,  y:150, size:8, rotate:90  },
];

// ═══════════════════════════════════════════════════════════
// RENDER SVG
// ═══════════════════════════════════════════════════════════
const VIEWBOX_W = 300, VIEWBOX_H = 300;
const svg = document.getElementById('map-svg');
svg.setAttribute('viewBox', `0 0 ${VIEWBOX_W} ${VIEWBOX_H}`);
svg.setAttribute('width',  VIEWBOX_W);
svg.setAttribute('height', VIEWBOX_H);

ZONES.forEach(z => {
  const [x,y,w,h] = z.rect;
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  if (z.interactive !== false) g.setAttribute('class','zona');
  g.dataset.id = z.id;

  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('fill', z.fill.startsWith('rgba') ? z.fill : z.fill);
  rect.setAttribute('rx', 3);
  if (z.fill && z.fill.startsWith('rgba')) rect.setAttribute('fill-opacity','0');
  if (z.stroke && z.stroke !== 'none') {
    rect.setAttribute('stroke', z.stroke);
    rect.setAttribute('stroke-width', z.sw || 1);
  }
  g.appendChild(rect);

  // Etiqueta principal
  if (z.label && z.interactive !== false) {
    const fontSize = h < 14 ? 5 : w < 40 ? (h < 18 ? 5.5 : 7) : (w < 70 ? 8 : 9.5);
    const cx = x + w / 2;
    const cy = z.labelY ? y + h * z.labelY : y + h / 2;

    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', cx); t.setAttribute('y', cy - (z.sub ? 3.5 : 0));
    t.setAttribute('class','zona-label');
    t.setAttribute('fill','#ffffff');
    t.setAttribute('font-size', fontSize);
    t.textContent = z.label;
    g.appendChild(t);

    if (z.sub) {
      const s = document.createElementNS('http://www.w3.org/2000/svg','text');
      s.setAttribute('x', cx); s.setAttribute('y', cy + fontSize * .9);
      s.setAttribute('class','zona-sub');
      s.setAttribute('fill', z.stroke || '#aaa');
      s.setAttribute('font-size', fontSize * .75);
      s.textContent = z.sub;
      g.appendChild(s);
    }
  }

  svg.appendChild(g);

  // Tap listener
  if (z.interactive !== false && z.name) {
    g.addEventListener('click', e => { e.stopPropagation(); openZone(z, x+w/2, y+h/2); });
  }
});

// Divisores canchas de fútbol (líneas horizontales entre PC/PB y PB/PA)
[[36,92],[36,138]].forEach(([x,y]) => {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x); l.setAttribute('y1',y);
  l.setAttribute('x2',x+100); l.setAttribute('y2',y);
  l.setAttribute('stroke','rgba(255,255,255,0.25)'); l.setAttribute('stroke-width','0.6');
  svg.appendChild(l);
});

// Divisores canchas secundarias (SA|SB en x=185, SB|SC en x=226)
[[185,56],[226,56]].forEach(([x,y]) => {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x); l.setAttribute('y1',y);
  l.setAttribute('x2',x); l.setAttribute('y2',y+92);
  l.setAttribute('stroke','rgba(255,255,255,0.15)'); l.setAttribute('stroke-width','0.5');
  svg.appendChild(l);
});

// Flecha ingreso
{
  const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  arrow.setAttribute('points','207,274 211,268 215,274');
  arrow.setAttribute('fill','#e8b84b');
  svg.appendChild(arrow);
}

// Etiquetas de calle
STREET_LABELS.forEach(sl => {
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', sl.x); t.setAttribute('y', sl.y);
  t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
  t.setAttribute('fill','#7a6b3a'); t.setAttribute('font-size', sl.size || 8);
  t.setAttribute('font-family', 'system-ui, sans-serif'); t.setAttribute('font-weight','600');
  if (sl.rotate) t.setAttribute('transform',`rotate(${sl.rotate},${sl.x},${sl.y})`);
  t.textContent = sl.text;
  svg.appendChild(t);
});

// ═══════════════════════════════════════════════════════════
// PAN + ZOOM (touch & mouse)
// ═══════════════════════════════════════════════════════════
const wrap = document.getElementById('map-wrap');
let tx = 0, ty = 0, scale = 1;
let dragging = false, lastX = 0, lastY = 0;
let pinchDist = null;
let activeZone = null;

function applyTransform() {
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  const sw = W / VIEWBOX_W, sh = H / VIEWBOX_H;
  const baseScale = Math.min(sw, sh);
  const s = baseScale * scale;
  svg.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
  svg.style.transformOrigin = '0 0';
  svg.style.width  = VIEWBOX_W + 'px';
  svg.style.height = VIEWBOX_H + 'px';
}

function resetView() {
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  const sw = W / VIEWBOX_W, sh = H / VIEWBOX_H;
  const bs = Math.min(sw, sh);
  scale = 1;
  tx = (W - VIEWBOX_W * bs) / 2;
  ty = (H - VIEWBOX_H * bs) / 2;
  applyTransform();
}

function zoomBy(factor, cx, cy) {
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  const bs = Math.min(W/VIEWBOX_W, H/VIEWBOX_H);
  cx = cx ?? W/2; cy = cy ?? H/2;
  const newScale = Math.max(0.6, Math.min(5, scale * factor));
  const ratio = newScale / scale;
  tx = cx - ratio * (cx - tx);
  ty = cy - ratio * (cy - ty);
  scale = newScale;
  applyTransform();
}

// Mouse
wrap.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; wrap.classList.add('dragging'); });
window.addEventListener('mouseup', () => { dragging=false; wrap.classList.remove('dragging'); });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX=e.clientX; lastY=e.clientY; applyTransform();
});
wrap.addEventListener('wheel', e => { e.preventDefault(); zoomBy(e.deltaY < 0 ? 1.12 : 0.9, e.clientX - wrap.getBoundingClientRect().left, e.clientY - wrap.getBoundingClientRect().top); }, {passive:false});

// Touch
function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.hypot(dx, dy);
}
let touchStart = null, touchMoved = false;
wrap.addEventListener('touchstart', e => {
  touchMoved = false;
  if (e.touches.length === 1) {
    touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY, tx, ty};
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    pinchDist = getTouchDist(e);
  }
}, {passive:true});

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  touchMoved = true;
  if (e.touches.length === 1) {
    tx += e.touches[0].clientX - lastX;
    ty += e.touches[0].clientY - lastY;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    applyTransform();
  } else if (e.touches.length === 2 && pinchDist) {
    const d = getTouchDist(e);
    const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - wrap.getBoundingClientRect().left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - wrap.getBoundingClientRect().top;
    zoomBy(d/pinchDist, cx, cy);
    pinchDist = d;
  }
}, {passive:false});

wrap.addEventListener('touchend', () => { pinchDist = null; });

// Click fondo cierra panel
svg.addEventListener('click', () => { if (!touchMoved) closePanel(); });

window.addEventListener('resize', resetView);

// ═══════════════════════════════════════════════════════════
// PANEL DE INFO
// ═══════════════════════════════════════════════════════════
const panel = document.getElementById('info-panel');
let activeEl = null;

function openZone(z) {
  document.getElementById('panel-icon').textContent = z.icon || '📍';
  document.getElementById('panel-name').textContent = z.name;
  document.getElementById('panel-type').textContent = z.type || '';
  document.getElementById('panel-desc').textContent = z.desc || '';
  document.getElementById('panel-acts').textContent = z.acts || '';
  panel.classList.add('open');

  // Highlight
  if (activeEl) activeEl.querySelector('rect').style.filter = '';
  activeEl = document.querySelector(`[data-id="${z.id}"]`);
  if (activeEl) activeEl.querySelector('rect').style.filter = 'brightness(1.35)';
}

function closePanel() {
  panel.classList.remove('open');
  if (activeEl) { activeEl.querySelector('rect').style.filter = ''; activeEl = null; }
}

function toggleLegend() {
  document.getElementById('legend-body').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
resetView();

// Ocultar hint tras 4s
setTimeout(() => { const h = document.getElementById('hint'); if(h) h.style.opacity='0'; }, 4000);
document.getElementById('hint').style.transition = 'opacity 1s';
</script>
