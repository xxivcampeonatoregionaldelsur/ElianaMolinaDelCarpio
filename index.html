<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Regional del Sur</title>

<style>
body{font-family:sans-serif;margin:0}

/* NAV */
nav{background:black;color:white;position:sticky;top:0;z-index:100}
.nav-inner{display:flex;justify-content:space-between;padding:10px}
.nav-links{display:flex;gap:10px}
.nav-links a{color:white;text-decoration:none}
.nav-links a.active{color:gold}

.menu-toggle{display:none;font-size:22px;cursor:pointer}

@media(max-width:768px){
  .menu-toggle{display:block}
  .nav-links{display:none;flex-direction:column;background:black;position:absolute;top:50px;width:100%}
  .nav-links.active{display:flex}
}

/* HERO */
.hero{padding:80px;text-align:center;background:#222;color:white;position:relative}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none}
.hero-ctas a{padding:10px;color:black;background:gold;margin:5px;display:inline-block}

/* SECCIÓN */
section{padding:80px 20px;scroll-margin-top:90px}

/* FIXTURE */
.fixture-item{border:1px solid #ddd;padding:10px;margin:10px 0;border-left:5px solid gold}

/* TABLA */
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
.pts-cell{color:red;font-weight:bold}

/* BOTON TOP */
#topBtn{position:fixed;bottom:20px;right:20px;display:none}
.fade-in{opacity:0;transform:translateY(20px);transition:0.5s}
.fade-in.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <div>🏆 Campeonato</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="#disciplinas">Disciplinas</a>
      <a href="#fixture">Fixture</a>
      <a href="#posiciones">Posiciones</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Campeonato Regional</h1>
  <div class="hero-ctas">
    <a href="#fixture">Ver Fixture</a>
    <a href="#posiciones">Ver Tabla</a>
  </div>
</section>

<section id="disciplinas">
  <h2>Disciplinas</h2>
  <p>Fútbol, vóley, ajedrez…</p>
</section>

<section id="fixture">
  <h2>Fixture</h2>
  <div class="fixture-list"></div>
</section>

<section id="posiciones">
  <h2>Tabla</h2>
  <table>
    <thead>
      <tr>
        <th>#</th><th>Equipo</th><th>G</th><th>I</th><th>Total</th>
      </tr>
    </thead>
    <tbody id="tabla-body"></tbody>
  </table>
</section>

<button id="topBtn">↑</button>

<script>

// 🔥 CONFIGURA TU LINK AQUÍ
const URL = "https://opensheet.elk.sh/TU_ID/Hoja1";

// ===== FIXTURE =====
fetch(URL)
.then(res=>res.json())
.then(data=>{
  const cont = document.querySelector(".fixture-list");
  cont.innerHTML="";

  data.forEach(f=>{
    let res = f.Resultado==="VS"
      ? `<div>VS</div>`
      : `<div>${f.Resultado}</div>`;

    cont.innerHTML += `
      <div class="fixture-item fade-in">
        ⏰ ${f.Hora}<br>
        ${f.Equipo1} ${res} ${f.Equipo2}<br>
        ${f.Deporte} - ${f.Lugar}
      </div>`;
  });

  animar();
});

// ===== TABLA =====
fetch(URL)
.then(r=>r.json())
.then(data=>{
  let tabla={};

  data.forEach(f=>{
    tabla[f.Equipo1] ??= {g:0,i:0};
    tabla[f.Equipo2] ??= {g:0,i:0};
  });

  data.forEach(f=>{
    if(!f.Resultado.includes("-")) return;

    let [a,b]=f.Resultado.split("-").map(Number);
    let tipo=f.Tipo==="G";

    if(a>b){
      tipo?tabla[f.Equipo1].g+=15:tabla[f.Equipo1].i+=5;
    }else{
      tipo?tabla[f.Equipo2].g+=15:tabla[f.Equipo2].i+=5;
    }
  });

  let arr=Object.entries(tabla).map(([k,v])=>({
    eq:k,g:v.g,i:v.i,t:v.g+v.i
  }));

  arr.sort((a,b)=>b.t-a.t);

  const tb=document.getElementById("tabla-body");
  tb.innerHTML="";

  arr.forEach((t,i)=>{
    tb.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${t.eq}</td>
      <td>${t.g}</td>
      <td>${t.i}</td>
      <td class="pts-cell">${t.t}</td>
    </tr>`;
  });
});

// ===== MENU =====
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

// ===== BOTON TOP =====
const btn=document.getElementById("topBtn");
window.onscroll=()=>btn.style.display=window.scrollY>200?"block":"none";
btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

// ===== MENU ACTIVO =====
const sections=document.querySelectorAll("section");
const links=document.querySelectorAll(".nav-links a");

window.addEventListener("scroll",()=>{
  let current="";
  sections.forEach(sec=>{
    if(scrollY>=sec.offsetTop-100){
      current=sec.id;
    }
  });

  links.forEach(l=>{
    l.classList.remove("active");
    if(l.getAttribute("href")==="#"+current){
      l.classList.add("active");
    }
  });
});

// ===== ANIMACIONES =====
function animar(){
  const obs=new IntersectionObserver(e=>{
    e.forEach(i=>{
      if(i.isIntersecting){
        i.target.classList.add("show");
      }
    })
  });

  document.querySelectorAll(".fade-in").forEach(el=>{
    obs.observe(el);
  });
}

</script>

</body>
</html>
